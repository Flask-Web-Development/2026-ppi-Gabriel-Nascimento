{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Criar{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">

  <label for="description">Descrição</label>
  <textarea name="description" id="description" required>{{ request.form['description'] }}</textarea>

  <label for="category_id">Categoria</label>
  <select name="category_id" required>
    {% for category in categories %}
    <option value="{{ category['id'] }}">{{ category['name'] }}</option>
    {% endfor %}
  </select>

  <label for="date">Data</label>
  <input type="date" name="date" id="date" required>{{ request.form['date'] }}</input>

  <label for="amount">R$</label>
  <input type="number" step="0.1" min="0" name="amount" id="amount" required>{{ request.form['amount'] }}</input>

  <input type="submit" value="Salvar">
</form>
{% endblock %}
